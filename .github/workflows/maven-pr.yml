name: Java CI with Maven

permissions:
  contents: read

on:
  pull_request:
    branches: ["*"]

jobs:
  call-maven-ci:
    uses: project-ncl/shared-github-actions/.github/workflows/maven-ci.yml@0fd979fcdd90cf1b62e6410221d64efd6b470865 # v0.0.21
    with:
      java_version: 11
      build_command: "mvn clean install -DskipTests"
      upload_artifacts: true
